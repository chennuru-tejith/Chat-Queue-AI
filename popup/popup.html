<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatQueue AI</title>
<!-- Google Fonts for premium typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #050508;
    --surface:       rgba(20, 18, 33, 0.45);
    --surface-solid: #0f0d19;
    --surface-hover: rgba(255, 255, 255, 0.05);
    --border:        rgba(255, 255, 255, 0.06);
    --border-glow:   rgba(217, 70, 239, 0.15);
    --text:          #f3f4f6;
    --muted:         #8b8ba0;
    --accent:        #d946ef; /* Orchid */
    --accent-glow:   rgba(217, 70, 239, 0.35);
    --accent2:       #8b5cf6; /* Violet */
    --accent2-glow:  rgba(139, 92, 246, 0.35);
    --green:         #10b981; /* Mint */
    --yellow:        #f59e0b; /* Amber */
    --blue:          #06b6d4; /* Cyan */
    --red:           #ef4444; /* Rose */
    --radius:        16px;
    --radius-sm:     10px;
    --font-heading:  'Outfit', -apple-system, sans-serif;
    --font-body:     'Inter', -apple-system, sans-serif;
    --font-mono:     'DM Mono', monospace;
  }

  body {
    width: 360px;
    min-height: 500px;
    background: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.16) 0%, rgba(5, 5, 8, 1) 85%), var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* Custom Scrollbar for Terminal Log */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }

  /* ── Header ─────────────────────────────────── */
  .header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    background: rgba(15, 13, 25, 0.3);
    backdrop-filter: blur(8px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .logo-title {
    display: flex;
    flex-direction: column;
  }

  .logo-text {
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #ffffff;
    line-height: 1.2;
  }

  .logo-sub {
    font-size: 9px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Status pill ─────────────────────────────── */
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(4px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-pill.idle     { border-color: rgba(255, 255, 255, 0.1); }
  .status-pill.idle     .status-dot { background: var(--muted); }
  
  .status-pill.active   { border-color: rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.05); }
  .status-pill.active   .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  
  .status-pill.waiting  { border-color: rgba(245, 158, 11, 0.2); background: rgba(245, 158, 11, 0.05); }
  .status-pill.waiting  .status-dot { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 2s infinite; }
  
  .status-pill.checking { border-color: rgba(6, 182, 212, 0.2); background: rgba(6, 182, 212, 0.05); }
  .status-pill.checking .status-dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); animation: blink 0.6s infinite; }
  
  .status-pill.done     { border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.08); }
  .status-pill.done     .status-dot { background: var(--green); }
  
  .status-pill.failed   { border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.08); }
  .status-pill.failed   .status-dot { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.85)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  /* ── Tabs ────────────────────────────────────── */
  .tabs {
    display: flex;
    padding: 12px 20px 0;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    background: rgba(15, 13, 25, 0.1);
  }

  .tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    font-family: var(--font-heading);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
    letter-spacing: 0.2px;
  }

  .tab:hover { color: #ffffff; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }

  /* ── Panels / Content ────────────────────────── */
  .panel { display: none; padding: 18px 20px 20px; }
  .panel.active { display: block; animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Form Controls ───────────────────────────── */
  .field { margin-bottom: 15px; }

  label {
    display: block;
    font-family: var(--font-heading);
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    backdrop-filter: blur(8px);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow), 0 4px 12px rgba(0, 0, 0, 0.3);
    background: var(--surface-solid);
  }

  textarea { height: 92px; line-height: 1.55; }

  .url-row {
    display: flex;
    gap: 8px;
  }
  .url-row input { flex: 1; }

  .btn-ghost {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: #e5e7eb;
    font-size: 11px;
    font-weight: 500;
    padding: 0 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: var(--font-body);
  }
  .btn-ghost:hover {
    background: var(--surface-hover);
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--border-glow);
  }
  .btn-ghost:active { transform: scale(0.97); }

  /* ── Time row ────────────────────────────────── */
  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .time-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--font-mono);
    transition: color 0.25s;
  }
  .time-hint.green { color: var(--green); }

  /* ── Action buttons ──────────────────────────── */
  .btn-primary {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: var(--font-heading);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 4px;
    box-shadow: 0 4px 14px var(--accent2-glow);
  }
  .btn-primary:hover {
    opacity: 0.95;
    box-shadow: 0 6px 18px var(--accent-glow);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(1px) scale(0.99); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-stop {
    width: 100%;
    padding: 11px;
    background: rgba(239, 68, 68, 0.05);
    border: 1px solid rgba(239, 68, 68, 0.35);
    border-radius: var(--radius-sm);
    color: #fca5a5;
    font-family: var(--font-heading);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .btn-stop:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--red);
    color: #ffffff;
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.25);
  }
  .btn-stop:active { transform: scale(0.99); }

  /* ── Status cards ────────────────────────────── */
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .status-label {
    font-family: var(--font-heading);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .status-value {
    font-size: 12px;
    font-weight: 600;
    color: #ffffff;
    text-align: right;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    border-radius: 100px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ── Log ─────────────────────────────────────── */
  .log-box {
    background: rgba(8, 7, 12, 0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    height: 230px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
  }

  .log-line { display: block; border-left: 2px solid transparent; padding-left: 6px; margin-bottom: 2px; }
  .log-line.success { color: #34d399; border-left-color: var(--green); }
  .log-line.warn    { color: #fbbf24; border-left-color: var(--yellow); }
  .log-line.info    { color: #67e8f9; border-left-color: var(--blue); }
  .log-line.error   { color: #f87171; border-left-color: var(--red); }

  /* ── Empty state ─────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 36px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 34px; margin-bottom: 10px; opacity: 0.6; }
  .empty-text { font-size: 12px; line-height: 1.6; }

  /* ── Helpers & details ───────────────────────── */
  .helper {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.5;
  }

  /* ── Toast ───────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 18, 30, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 550;
    color: #ffffff;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 10px var(--border-glow);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Chip ────────────────────────────────────── */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .chip.green  { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
  .chip.yellow { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
  .chip.blue   { background: rgba(6, 182, 212, 0.1); color: #22d3ee; border: 1px solid rgba(6, 182, 212, 0.2); }
  .chip.purple { background: rgba(217, 70, 239, 0.1); color: #e879f9; border: 1px solid rgba(217, 70, 239, 0.2); }
  .chip.gray   { background: rgba(156, 163, 175, 0.1); color: #d1d5db; border: 1px solid rgba(156, 163, 175, 0.2); }
  .chip.red    { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }

  /* ── Prompt Templates Chips ─────────────────── */
  .template-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
    max-height: 52px;
    overflow-y: auto;
    padding-bottom: 2px;
  }

  .template-chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: var(--font-body);
    letter-spacing: 0.1px;
    white-space: nowrap;
  }

  .template-chip:hover {
    color: #ffffff;
    border-color: var(--accent);
    background: rgba(217, 70, 239, 0.08);
    box-shadow: 0 0 6px var(--border-glow);
    transform: scale(1.02);
  }

  .template-chip:active {
    transform: scale(0.96);
  }

  .template-chip.custom {
    border-style: dashed;
    border-color: var(--accent2);
  }
  
  .template-chip-del {
    margin-left: 5px;
    opacity: 0.4;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-block;
  }
  .template-chip-del:hover {
    opacity: 1;
    color: var(--red) !important;
    transform: scale(1.2);
  }

  /* ── Prompt Stats Counter ───────────────────── */
  .prompt-stats {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  .prompt-stats .stat-highlight {
    color: var(--accent);
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">⏱</div>
    <div class="logo-title">
      <div class="logo-text">ChatQueue AI</div>
      <div class="logo-sub">for AI Agents</div>
    </div>
  </div>
  <div class="status-pill idle" id="headerPill">
    <div class="status-dot"></div>
    <span id="headerPillText">Idle</span>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="setup">Setup</div>
  <div class="tab" data-tab="status">Status</div>
  <div class="tab" data-tab="log">Log</div>
</div>

<!-- ── SETUP TAB ─────────────────────────────────────────────────── -->
<div class="panel active" id="tab-setup">

  <div class="field">
    <label>Chat URL</label>
    <div class="url-row">
      <input type="text" id="chatUrl" placeholder="https://..." />
      <button class="btn-ghost" id="btnCurrentTab">Use current tab</button>
    </div>
    <div class="helper">Open your AI chat (Claude, ChatGPT, Gemini, DeepSeek), then click "Use current tab"</div>
  </div>

  <div class="field">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <label style="margin-bottom: 0;">Resume Prompt</label>
      <button class="btn-ghost" id="btnSyncComposer" title="Sync with active AI chat input" style="font-size: 11px; padding: 2px 8px; border-radius: 100px; cursor: pointer; color: var(--accent);">🔄 Sync AI Input</button>
    </div>
    <div class="template-chips" id="templateChips">
      <!-- Loaded dynamically in popup.js -->
    </div>
    <textarea id="prompt" placeholder="Continue from where we left off. Next step: ..."></textarea>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
      <button class="btn-ghost" id="btnSaveTemplate" style="font-size: 10px; padding: 4px 10px; border-radius: 100px;">+ Save Template</button>
      <div class="prompt-stats" id="promptStats"><span id="promptCharCount">0 chars</span> · <span id="promptTokenCount" class="stat-highlight">0 tokens</span></div>
    </div>
  </div>

  <div class="time-row">
    <div class="field">
      <label>Limit resets in (min)</label>
      <input type="number" id="resetMinutes" value="0" min="0" max="600" />
      <div class="time-hint">Auto-detected from page</div>
    </div>
    <div class="field">
      <label>Check every (sec)</label>
      <input type="number" id="checkInterval" value="60" min="15" max="300" />
      <div class="time-hint">How often to retry</div>
    </div>
  </div>

  <button class="btn-primary" id="btnStart">▶ Start ChatQueue AI</button>
  <button class="btn-stop" id="btnStop" style="display:none">■ Stop</button>

</div>

<!-- ── STATUS TAB ────────────────────────────────────────────────── -->
<div class="panel" id="tab-status">
  <div id="statusContent">
    <div class="empty-state">
      <div class="empty-icon">🕒</div>
      <div class="empty-text">No active session.<br>Go to Setup and click Start.</div>
    </div>
  </div>
</div>

<!-- ── LOG TAB ───────────────────────────────────────────────────── -->
<div class="panel" id="tab-log">
  <div class="log-box" id="logBox">
    <span class="log-line" style="color:var(--muted)">No log entries yet.</span>
  </div>
</div>

<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
