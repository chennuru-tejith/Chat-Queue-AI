<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude AutoResume</title>
<style>
/* System font stack — no external CDN dependency */
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e10;
    --surface:   #18181c;
    --surface2:  #222228;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --text:      #f0f0f2;
    --muted:     #6e6e80;
    --accent:    #a78bfa;
    --accent2:   #7c3aed;
    --green:     #4ade80;
    --yellow:    #facc15;
    --blue:      #60a5fa;
    --red:       #f87171;
    --radius:    12px;
    --radius-sm: 8px;
  }

  body {
    width: 360px;
    min-height: 480px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────── */
  .header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(167,139,250,0.06) 0%, transparent 100%);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Cascadia Code', 'Consolas', 'SF Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* ── Status pill ─────────────────────────────── */
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border2);
    background: var(--surface);
    transition: all 0.3s;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-pill.idle     .status-dot { background: var(--muted); }
  .status-pill.active   .status-dot { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
  .status-pill.waiting  .status-dot { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); animation: pulse 2s infinite; }
  .status-pill.checking .status-dot { background: var(--blue); box-shadow: 0 0 5px var(--blue); animation: blink 0.6s infinite; }
  .status-pill.done     .status-dot { background: var(--green); }
  .status-pill.failed   .status-dot { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── Tabs ────────────────────────────────────── */
  .tabs {
    display: flex;
    padding: 12px 20px 0;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Content ─────────────────────────────────── */
  .panel { display: none; padding: 16px 20px 20px; }
  .panel.active { display: block; }

  /* ── Form ────────────────────────────────────── */
  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    resize: none;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.12);
  }

  textarea { height: 88px; line-height: 1.5; }

  .url-row {
    display: flex;
    gap: 6px;
  }
  .url-row input { flex: 1; }

  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    padding: 0 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* ── Time row ────────────────────────────────── */
  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .time-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Cascadia Code', 'Consolas', 'SF Mono', monospace;
  }

  /* ── Action button ───────────────────────────── */
  .btn-primary {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-stop {
    width: 100%;
    padding: 11px;
    background: transparent;
    border: 1px solid var(--red);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
  }
  .btn-stop:hover { background: rgba(248,113,113,0.08); }

  /* ── Status panel ────────────────────────────── */
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .status-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .status-value {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    border-radius: 100px;
    transition: width 1s ease;
    width: 0%;
  }

  /* ── Log ─────────────────────────────────────── */
  .log-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    height: 220px;
    overflow-y: auto;
    font-family: 'Cascadia Code', 'Consolas', 'SF Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }

  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-track { background: transparent; }
  .log-box::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .log-line { display: block; }
  .log-line.success { color: var(--green); }
  .log-line.warn    { color: var(--yellow); }
  .log-line.info    { color: var(--blue); }
  .log-line.error   { color: var(--red); }

  /* ── Empty state ─────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-text { font-size: 12px; line-height: 1.6; }

  /* ── Divider ─────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  /* ── Helper text ─────────────────────────────── */
  .helper {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.5;
  }

  /* ── Toast ───────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 7px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Chip ────────────────────────────────────── */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .chip.green { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .chip.yellow { background: rgba(250,204,21,0.1); color: var(--yellow); border: 1px solid rgba(250,204,21,0.2); }
  .chip.blue { background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }
  .chip.purple { background: rgba(167,139,250,0.1); color: var(--accent); border: 1px solid rgba(167,139,250,0.2); }
  .chip.gray { background: rgba(107,114,128,0.1); color: var(--muted); border: 1px solid rgba(107,114,128,0.2); }
  .chip.red { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

  /* ── Prompt template chips ──────────────────── */
  .template-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }

  .template-chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: all 0.15s;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    letter-spacing: 0.1px;
    white-space: nowrap;
  }

  .template-chip:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(167,139,250,0.06);
  }

  .template-chip:active {
    transform: scale(0.97);
  }

  /* ── Prompt stats (token counter) ──────────── */
  .prompt-stats {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    font-family: monospace;
  }

  .prompt-stats .stat-highlight {
    color: var(--accent);
    font-weight: 600;
  }

  .template-chip.custom {
    border-style: dashed;
  }
  .template-chip-del {
    margin-left: 5px;
    opacity: 0.5;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.15s, opacity 0.15s;
    display: inline-block;
  }
  .template-chip-del:hover {
    opacity: 1;
    color: var(--red) !important;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">⏱</div>
    <div>
      <div class="logo-text">AutoResume</div>
      <div class="logo-sub">for Claude</div>
    </div>
  </div>
  <div class="status-pill idle" id="headerPill">
    <div class="status-dot"></div>
    <span id="headerPillText">Idle</span>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="setup">Setup</div>
  <div class="tab" data-tab="status">Status</div>
  <div class="tab" data-tab="log">Log</div>
</div>

<!-- ── SETUP TAB ─────────────────────────────────────────────────── -->
<div class="panel active" id="tab-setup">

  <div class="field">
    <label>Claude Chat URL</label>
    <div class="url-row">
      <input type="text" id="chatUrl" placeholder="https://claude.ai/chat/..." />
      <button class="btn-ghost" id="btnCurrentTab">Use current tab</button>
    </div>
    <div class="helper">Open your Claude chat, then click "Use current tab"</div>
  </div>

  <div class="field">
    <label>Resume Prompt</label>
    <div class="template-chips" id="templateChips">
      <!-- Loaded dynamically in popup.js -->
    </div>
    <textarea id="prompt" placeholder="Continue from where we left off. Next step: ..."></textarea>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
      <button class="btn-ghost" id="btnSaveTemplate" style="font-size: 10px; padding: 4px 8px; border-radius: 100px;">Save as template</button>
      <div class="prompt-stats" id="promptStats"><span id="promptCharCount">0 chars</span> · <span id="promptTokenCount" class="stat-highlight">0 tokens</span></div>
    </div>
    <div class="helper">What should Claude do when the limit resets?</div>
  </div>

  <div class="time-row">
    <div class="field">
      <label>Limit resets in (min)</label>
      <input type="number" id="resetMinutes" value="0" min="0" max="600" />
      <div class="time-hint">Auto-detected from page</div>
    </div>
    <div class="field">
      <label>Check every (sec)</label>
      <input type="number" id="checkInterval" value="60" min="15" max="300" />
      <div class="time-hint">How often to retry</div>
    </div>
  </div>

  <button class="btn-primary" id="btnStart">▶ Start AutoResume</button>
  <button class="btn-stop" id="btnStop" style="display:none">■ Stop</button>

</div>

<!-- ── STATUS TAB ────────────────────────────────────────────────── -->
<div class="panel" id="tab-status">
  <div id="statusContent">
    <div class="empty-state">
      <div class="empty-icon">🕒</div>
      <div class="empty-text">No active session.<br>Go to Setup and click Start.</div>
    </div>
  </div>
</div>

<!-- ── LOG TAB ───────────────────────────────────────────────────── -->
<div class="panel" id="tab-log">
  <div class="log-box" id="logBox">
    <span class="log-line" style="color:var(--muted)">No log entries yet.</span>
  </div>
</div>

<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
